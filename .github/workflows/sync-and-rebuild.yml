name: Sync Upstream and Rebuild

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-rebuild:
    name: Sync upstream and rebuild Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature/cheap2
        uses: actions/checkout@v4
        with:
          ref: feature/cheap2
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/evcc-io/evcc.git
          git fetch upstream master

      - name: Count new upstream commits
        id: upstream
        run: |
          count=$(git rev-list HEAD..upstream/master --count)
          echo "new_commits=$count" >> "$GITHUB_OUTPUT"
          echo "Upstream has $count new commits"

      - name: Merge upstream/master
        if: ${{ steps.upstream.outputs.new_commits != '0' }}
        run: git merge upstream/master --no-edit -m "chore: sync upstream $(date +%Y-%m-%d)"

      - name: Push synced branch
        if: ${{ steps.upstream.outputs.new_commits != '0' }}
        run: git push origin feature/cheap2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/vondraussen/evc:nightly
            ghcr.io/vondraussen/evc:nightly.${{ steps.date.outputs.date }}
          cache-from: type=registry,ref=ghcr.io/vondraussen/evc:nightly
          cache-to: type=inline
