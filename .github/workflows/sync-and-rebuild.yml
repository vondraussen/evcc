name: Sync Upstream and Rebuild

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-rebuild:
    name: Sync upstream and rebuild Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature/cheap2
        uses: actions/checkout@v4
        with:
          ref: feature/cheap2
          fetch-depth: 0
          # PAT with repo+workflow scopes is required to push upstream workflow
          # file changes. Create one at github.com/settings/tokens and add it
          # as a repo secret named SYNC_PAT.
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/evcc-io/evcc.git
          git fetch upstream master

      - name: Save local customisations as patch
        run: |
          # Capture our deliberate changes vs upstream before merging.
          # After -X theirs resolves conflicts, this patch is re-applied so our
          # customisations (cheaper runners, no integration job) survive the sync.
          # Add more files to the list here if needed.
          git diff upstream/master HEAD -- .github/workflows/default.yml > /tmp/local-patch.diff
          if [ -s /tmp/local-patch.diff ]; then
            echo "Saved local customisations ($(wc -l < /tmp/local-patch.diff) lines)"
            git diff --stat upstream/master HEAD -- .github/workflows/default.yml
          else
            echo "No local customisations vs upstream"
          fi

      - name: Count new upstream commits
        id: upstream
        run: |
          count=$(git rev-list HEAD..upstream/master --count)
          echo "new_commits=$count" >> "$GITHUB_OUTPUT"
          echo "Upstream has $count new commits"

      - name: Merge upstream/master
        if: ${{ steps.upstream.outputs.new_commits != '0' }}
        run: |
          # -X theirs: on any conflict take upstream's version automatically.
          # Local customisations are re-applied in the next step.
          git merge upstream/master --no-edit -X theirs -m "sync upstream $(date +%Y-%m-%d)"

      - name: Re-apply local customisations
        if: ${{ steps.upstream.outputs.new_commits != '0' }}
        run: |
          if [ ! -s /tmp/local-patch.diff ]; then
            echo "No local customisations to re-apply"
            exit 0
          fi
          # If the patch is already in place (no conflict occurred), skip.
          if git apply --check --reverse /tmp/local-patch.diff 2>/dev/null; then
            echo "Customisations already in place, nothing to re-apply"
            exit 0
          fi
          # Upstream overwrote our changes; re-apply with 3-way merge support.
          if git apply --3way /tmp/local-patch.diff; then
            git diff --staged --quiet || git commit -m "re-apply local customisations"
            echo "Local customisations re-applied successfully"
          else
            echo "::error::Patch failed to apply after upstream merge."
            echo "Upstream changed an area we customise. Review the diff below and"
            echo "update the customisation or resolve the conflict manually."
            echo ""
            echo "=== Our customisations (local vs upstream/master) ==="
            cat /tmp/local-patch.diff
            exit 1
          fi

      - name: Push synced branch
        if: ${{ steps.upstream.outputs.new_commits != '0' }}
        run: |
          git push origin feature/cheap2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/vondraussen/evc:nightly
            ghcr.io/vondraussen/evc:nightly.${{ steps.date.outputs.date }}
          cache-from: type=registry,ref=ghcr.io/vondraussen/evc:nightly
          cache-to: type=inline
